name: Scrape Pokemon Card Prices

on:
  # Run every Sunday at midnight UTC
  schedule:
    - cron: "0 0 * * 0"

  # Allow manual trigger from the GitHub Actions tab or via API
  workflow_dispatch:
    inputs:
      card_name:
        description: "Card name to scrape (leave blank to scrape all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run price scraper
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          CARD_NAME: ${{ inputs.card_name }}
        run: python scraper/scraper.py

      - name: Commit and push new card images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/cards/
          if git diff --cached --quiet; then
            echo "No new images to commit."
          else
            git commit -m "chore: add card images from price scraper run"
            git push
          fi
